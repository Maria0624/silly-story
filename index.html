<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silly Story Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎭 Silly Story Generator</h1>

  <div class="container">

    <p>
      <label>Enter custom name:</label>
      <input type="text" id="customName" placeholder="Optional">
    </p>

    <p>
      <button id="generate">Generate random story</button>
    </p>

    <p id="story"></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
